<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Chá de Bebê – Lara</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Playfair+Display:ital,wght@0,400;0,500;1,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="convite-wrapper">
    <img src="WhatsApp Image 2026-07-03 at 16.12.20.jpeg" alt="Fundo" class="img-fundo">

    <div class="lista-presentes-wrapper">
      <h2 class="lista-titulo">Sugestões de Presentes</h2>

      <ul class="lista-presentes">
        <li>Fraldas (tam. P ou M)</li>
        <li>Lenços umedecidos</li>
        <li>Pomada para assaduras</li>
        <li>Sabonete líquido</li>
        <li>Toalhas de boca</li>
        <li>Cueiro</li>
        <li>Meias</li>
        <li>Roupinhas (tam. P)</li>
      </ul>

      <p class="mensagem-extra">Se preferir, mimos para a mamãe e o papai também são muito bem-vindos!</p>

      <a href="#" id="confirmar-presenca" class="btn-whatsapp">
        Confirmar Presença
      </a>

      <a href="index.html" class="link-voltar">Voltar para o convite</a>
    </div>
  </div>
  
  <script>
    document.getElementById('confirmar-presenca').addEventListener('click', function(event) {
      event.preventDefault();
      
      // Insira o número do WhatsApp com o código do país e DDD (ex: 5551999998888)
      const numeroWhatsapp = 'SEUNUMERODOWHATTSAPP'; 
      const texto = 'Vou comparecer na Festa da Princesa Lara!!';
      
      const url = `https://api.whatsapp.com/send?phone=${numeroWhatsapp}&text=${encodeURIComponent(texto)}`;
      window.open(url, '_blank');
    });
  </script>
</body>
</html>
